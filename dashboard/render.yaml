services:
  - type: web
    name: edus-trader
    env: python
    plan: free
    rootDir: dashboard      # ← AÑADE ESTO
    buildCommand: pip install -r requirements.txt
    startCommand: python server_render.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FINNHUB_KEY
        sync: false
